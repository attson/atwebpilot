name: Build Extension

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Typecheck, Test, Build, and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Override extension version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          jq --arg v "$version" '.version = $v' packages/extension/package.json > tmp.json
          mv tmp.json packages/extension/package.json
          echo "extension version → $version"

      - name: Build extension
        run: pnpm build

      - name: Read package version
        id: package
        run: |
          version=$(node -p "require('./packages/extension/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "zip_name=atwebpilot-$version.zip" >> "$GITHUB_OUTPUT"

      - name: Package dist
        run: |
          cd packages/extension/dist
          zip -r "${{ github.workspace }}/${{ steps.package.outputs.zip_name }}" .

      - name: Upload packaged extension
        uses: actions/upload-artifact@v4
        with:
          name: atwebpilot-extension-${{ steps.package.outputs.version }}
          path: ${{ steps.package.outputs.zip_name }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          ZIP_NAME: ${{ steps.package.outputs.zip_name }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$ZIP_NAME" --clobber
          else
            gh release create "$tag" "$ZIP_NAME" --title "$tag" --generate-notes
          fi
