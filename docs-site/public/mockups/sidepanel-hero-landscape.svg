<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- Outer browser window bg -->
  <rect width="1200" height="720" rx="12" fill="#18181b"/>
  <rect width="1200" height="720" rx="12" fill="none" stroke="#3f3f46" stroke-width="1"/>

  <!-- Browser chrome: title bar -->
  <rect width="1200" height="42" rx="12" fill="#27272a"/>
  <rect y="30" width="1200" height="12" fill="#27272a"/>
  <circle cx="20" cy="21" r="6" fill="#ef4444"/>
  <circle cx="42" cy="21" r="6" fill="#f59e0b"/>
  <circle cx="64" cy="21" r="6" fill="#10b981"/>

  <!-- Tab bar -->
  <rect x="90" y="8" width="240" height="28" rx="6" fill="#18181b"/>
  <text x="106" y="26" fill="#e4e4e7" font-size="11">example.com — Product page</text>
  <rect x="336" y="10" width="24" height="24" rx="4" fill="#3f3f46"/>
  <text x="348" y="26" fill="#a1a1aa" font-size="14" text-anchor="middle">+</text>

  <!-- URL bar -->
  <rect y="42" width="1200" height="36" fill="#1f1f22"/>
  <rect x="16" y="50" width="24" height="20" rx="3" fill="#3f3f46"/>
  <rect x="46" y="50" width="24" height="20" rx="3" fill="#3f3f46"/>
  <rect x="86" y="50" width="820" height="20" rx="10" fill="#0b0b0d"/>
  <text x="102" y="64" fill="#71717a" font-size="11" font-family="ui-monospace, monospace">🔒 example.com/products/A1</text>
  <!-- Extension icon -->
  <rect x="920" y="50" width="24" height="20" rx="4" fill="#065f46"/>
  <text x="932" y="64" fill="#a7f3d0" font-size="11" font-weight="700" text-anchor="middle">A</text>

  <!-- Split: page area | sidepanel -->
  <!-- Page area (left) -->
  <rect y="78" width="820" height="642" fill="#0b0b0d"/>

  <!-- Page content: product mockup -->
  <text x="40" y="130" fill="#e4e4e7" font-size="22" font-weight="700">XX 系列 · 型号 A1</text>
  <g transform="translate(40, 148)">
    <text fill="#fbbf24" font-size="15">★★★★★</text>
    <text x="94" y="0" fill="#71717a" font-size="12">1284 条评论 · 平均 4.6 星</text>
  </g>
  <text x="40" y="200" fill="#10b981" font-size="24" font-weight="700">¥299</text>
  <text x="120" y="200" fill="#71717a" font-size="14" text-decoration="line-through">¥399</text>
  <rect x="212" y="182" width="52" height="22" rx="4" fill="#450a0a"/>
  <text x="238" y="198" fill="#fca5a5" font-size="11" text-anchor="middle">-25%</text>

  <!-- Product image placeholder -->
  <rect x="40" y="220" width="240" height="180" rx="8" fill="#1f1f22" stroke="#3f3f46"/>
  <text x="160" y="315" fill="#3f3f46" font-size="12" text-anchor="middle" font-family="ui-monospace, monospace">[ 商品主图 ]</text>

  <!-- Info box -->
  <rect x="300" y="220" width="480" height="180" rx="8" fill="#141416"/>
  <text x="316" y="245" fill="#a1a1aa" font-size="11">规格</text>
  <text x="316" y="265" fill="#e4e4e7" font-size="12">尺寸 · 20×15×8 cm · 重量 350g · 电池 3000mAh</text>
  <text x="316" y="290" fill="#a1a1aa" font-size="11">配送</text>
  <text x="316" y="310" fill="#e4e4e7" font-size="12">7 天无理由 · 24 小时发货</text>
  <text x="316" y="335" fill="#a1a1aa" font-size="11">评分分布</text>
  <g transform="translate(316, 348)">
    <rect width="120" height="6" rx="3" fill="#3f3f46"/>
    <rect width="102" height="6" rx="3" fill="#fbbf24"/>
    <text x="132" y="6" fill="#a1a1aa" font-size="10">5 星 85%</text>
  </g>

  <!-- Buttons -->
  <rect x="40" y="420" width="140" height="40" rx="8" fill="#065f46"/>
  <text x="110" y="446" fill="#a7f3d0" font-size="13" font-weight="600" text-anchor="middle">加入购物车</text>
  <rect x="192" y="420" width="140" height="40" rx="8" fill="#dc2626"/>
  <text x="262" y="446" fill="#fecaca" font-size="13" font-weight="600" text-anchor="middle">立即购买</text>

  <!-- Section: reviews -->
  <text x="40" y="500" fill="#e4e4e7" font-size="14" font-weight="700">用户评论</text>
  <line x1="40" y1="510" x2="780" y2="510" stroke="#27272a"/>
  <g transform="translate(40, 528)">
    <text fill="#fbbf24" font-size="11">★★★★★</text>
    <text x="70" y="0" fill="#a1a1aa" font-size="11">好用 · 已回购</text>
  </g>
  <g transform="translate(40, 550)">
    <text fill="#fbbf24" font-size="11">★★★★☆</text>
    <text x="70" y="0" fill="#a1a1aa" font-size="11">质量不错 · 客服响应快</text>
  </g>
  <g transform="translate(40, 572)">
    <text fill="#fbbf24" font-size="11">★★★★★</text>
    <text x="70" y="0" fill="#a1a1aa" font-size="11">物流神速 · 包装严实</text>
  </g>
  <g transform="translate(40, 594)">
    <text fill="#71717a" font-size="11">... 还有 1281 条评论</text>
  </g>

  <!-- Sidepanel (right) -->
  <rect x="820" y="78" width="380" height="642" fill="#09090b"/>
  <line x1="820" y1="78" x2="820" y2="720" stroke="#27272a" stroke-width="1"/>

  <!-- Sidepanel Header -->
  <rect x="820" y="78" width="380" height="42" fill="#18181b"/>
  <text x="836" y="105" fill="#e4e4e7" font-size="13" font-weight="700">AtWebPilot</text>
  <text x="912" y="105" fill="#71717a" font-size="10" font-family="ui-monospace, monospace">v0.0.44</text>
  <g transform="translate(1040, 92)" fill="#3f3f46">
    <rect width="16" height="16" rx="3"/>
    <rect x="20" width="16" height="16" rx="3"/>
    <rect x="40" width="16" height="16" rx="3"/>
    <rect x="60" width="16" height="16" rx="3"/>
    <rect x="80" width="16" height="16" rx="3"/>
    <rect x="100" width="16" height="16" rx="3"/>
  </g>

  <!-- Tab identity -->
  <rect x="820" y="120" width="380" height="26" fill="#0f0f11"/>
  <circle cx="834" cy="133" r="4" fill="#10b981"/>
  <text x="846" y="137" fill="#a1a1aa" font-size="10" font-family="ui-monospace, monospace">example.com/products/A1 · Tab #142</text>

  <!-- User bubble -->
  <rect x="832" y="160" width="356" height="42" rx="6" fill="#1e3a8a" opacity="0.35"/>
  <text x="844" y="180" fill="#dbeafe" font-size="12">用三个要点总结此页</text>
  <text x="844" y="196" fill="#93c5fd" font-size="10">并抽出价格与评分</text>

  <!-- Assistant bubble -->
  <rect x="832" y="216" width="356" height="330" rx="6" fill="#18181b"/>

  <!-- Summary header -->
  <text x="848" y="238" fill="#a1a1aa" font-size="11">▾ 5 步</text>

  <!-- Compact step rows -->
  <g transform="translate(848, 252)">
    <g>
      <circle cx="6" cy="6" r="5" fill="#059669"/>
      <text x="18" y="10" fill="#e4e4e7" font-size="11">获取页面信息</text>
      <text x="326" y="10" fill="#71717a" font-size="10" text-anchor="end">2ms</text>
    </g>
    <g transform="translate(0, 22)">
      <circle cx="6" cy="6" r="5" fill="#059669"/>
      <text x="18" y="10" fill="#e4e4e7" font-size="11">抓页面快照</text>
      <text x="326" y="10" fill="#71717a" font-size="10" text-anchor="end">3ms</text>
    </g>
    <g transform="translate(0, 44)">
      <circle cx="6" cy="6" r="5" fill="#059669"/>
      <text x="18" y="10" fill="#e4e4e7" font-size="11">提取文本</text>
      <text x="326" y="10" fill="#71717a" font-size="10" text-anchor="end">4ms</text>
    </g>
    <g transform="translate(0, 66)">
      <circle cx="6" cy="6" r="5" fill="#059669"/>
      <text x="18" y="10" fill="#e4e4e7" font-size="11">找匹配元素</text>
      <text x="326" y="10" fill="#71717a" font-size="10" text-anchor="end">3ms</text>
    </g>
    <g transform="translate(0, 88)">
      <circle cx="6" cy="6" r="5" fill="#059669"/>
      <text x="18" y="10" fill="#e4e4e7" font-size="11">读表单状态</text>
      <text x="326" y="10" fill="#71717a" font-size="10" text-anchor="end">2ms</text>
    </g>
  </g>

  <!-- Assistant response -->
  <text x="848" y="376" fill="#e4e4e7" font-size="11">这是一个电商产品页面，主要包含：</text>
  <text x="848" y="396" fill="#a1a1aa" font-size="11">1. 商品「XX 系列 · 型号 A1」，规格标</text>
  <text x="848" y="412" fill="#a1a1aa" font-size="11">   注 20×15×8 cm，重 350g</text>
  <text x="848" y="432" fill="#a1a1aa" font-size="11">2. 价格 ¥299（原价 ¥399，打折 25%）</text>
  <text x="848" y="452" fill="#a1a1aa" font-size="11">3. 用户评论 1284 条，平均 4.6 星，5</text>
  <text x="848" y="468" fill="#a1a1aa" font-size="11">   星占比 85%</text>

  <!-- Action row inside bubble -->
  <text x="1170" y="530" fill="#3f3f46" font-size="10" text-anchor="end">复制  重生成</text>

  <!-- Input area -->
  <rect x="832" y="562" width="356" height="72" rx="6" fill="#18181b" stroke="#27272a"/>
  <text x="844" y="586" fill="#52525b" font-size="11">告诉 AI 你要做什么…</text>
  <g transform="translate(844, 602)">
    <rect width="42" height="20" rx="4" fill="#065f46"/>
    <text x="21" y="14" fill="#a7f3d0" font-size="10" text-anchor="middle">默认</text>
    <rect x="52" width="20" height="20" rx="3" fill="#27272a"/>
    <rect x="76" width="20" height="20" rx="3" fill="#27272a"/>
    <rect x="100" width="20" height="20" rx="3" fill="#27272a"/>
  </g>
  <rect x="1156" y="602" width="24" height="20" rx="4" fill="#1d4ed8"/>
  <text x="1168" y="616" fill="#ffffff" font-size="12" text-anchor="middle">↑</text>

  <!-- Callout arrow: sidepanel labeled -->
  <g opacity="0.85">
    <line x1="740" y1="440" x2="820" y2="380" stroke="#10b981" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="600" y="430" fill="#10b981" font-size="12" font-weight="600" text-anchor="end">← AI 助手侧边面板</text>
    <text x="600" y="450" fill="#a1a1aa" font-size="10" text-anchor="end">在任意网页右侧打开</text>
  </g>

  <!-- Stats along bottom-right -->
  <text x="832" y="700" fill="#3f3f46" font-size="9" font-family="ui-monospace, monospace">round 1/20  ·  in 5.2k / out 1.8k</text>
</svg>
